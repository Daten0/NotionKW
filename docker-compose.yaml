services:
  # 🗄️ DATABASE
  db:
    image: alpine/mysql:15.2
    container_name: notion_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3307"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notion_net

  # ⚙️ BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notion_backend
    restart: unless-stopped
    env_file:
      - .env 
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${DB_PORT}
    ports:
      - "${BACKEND_PORT}:3005"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notion_net

  # 🌐 FRONTEND
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notion_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - notion_net

volumes:
  db_data:

networks:
  notion_net:
    driver: bridge
# ===================Updated====================== #
services:
  # 🗄️ DATABASE
  db:
    image: mysql:8.0.1     # ✅ Gunakan server resmi, bukan client alpine
    container_name: notion_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"           # ✅ Standar Host:Container
    volumes:
      - db_data:/var/lib/mysql:Z
    networks:
      - notion_net

  # ⚙️ BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notion_backend
    restart: unless-stopped
    env_file:
      - .env                  # Load default dari .env
    environment:
      # ⚠️ PENTING: Override khusus Docker Network
      DB_HOST: db             # ✅ "db" adalah nama service container database
      APP_PORT: ${APP_PORT}              # ✅ Backend jalan di port 3000 (bukan 3306)
      DB_PORT: ${DB_PORT}          # ✅ Port internal MySQL di container db
    ports:
      - "${APP_PORT}:3001"           # ✅ Sesuaikan dengan PORT aplikasi
    depends_on:
      - db
    networks:
      - notion_net

  # 🌐 FRONTEND
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notion_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - notion_net

volumes:
  db_data:

networks:
  notion_net:
    driver: bridge
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion-like Markdown Editor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Library ringan untuk render Markdown ke HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR: Daftar Catatan -->
        <aside class="sidebar">
            <h2>📝 Catatan Saya</h2>
            <button id="new-note-btn">+ Catatan Baru</button>
            <ul id="notes-list"></ul>
        </aside>

        <!-- MAIN: Editor & Preview -->
        <main class="editor-area">
            <div class="editor-header">
                <input type="text" id="note-title" placeholder="Judul Catatan..." />
                <button id="save-btn">💾 Simpan Manual</button>
            </div>
            <div class="editor-content">
                <textarea id="markdown-input" placeholder="Ketik Markdown di sini... (misal: # Heading, **tebal**, - list)"></textarea>
                <div id="markdown-preview" class="preview"></div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
